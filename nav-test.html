<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation & Pagination Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f5f5f5;
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: #333;
    }

    .test-section {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .test-section h2 {
      margin-top: 0;
      color: #666;
      font-size: 18px;
    }

    swiper-carousel {
      margin: 20px 0;
      border: 2px dashed #ddd;
      padding: 10px;
    }

    .swiper-slide {
      height: 300px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      font-weight: bold;
    }

    .debug-info {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 13px;
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }

    .debug-info div {
      margin: 5px 0;
    }

    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
  </style>
</head>
<body>
  <h1>🔧 Navigation & Pagination Test</h1>
  
  <div class="test-section">
    <h2>Test 1: Basic Carousel with Navigation & Pagination</h2>
    <swiper-carousel id="test1">
      <div class="swiper-slide">1</div>
      <div class="swiper-slide">2</div>
      <div class="swiper-slide">3</div>
      <div class="swiper-slide">4</div>
    </swiper-carousel>
    <div class="debug-info" id="debug1">Waiting for initialization...</div>
  </div>

  <div class="test-section">
    <h2>Test 2: Navigation Only (no pagination)</h2>
    <swiper-carousel id="test2" pagination="false">
      <div class="swiper-slide">A</div>
      <div class="swiper-slide">B</div>
      <div class="swiper-slide">C</div>
    </swiper-carousel>
    <div class="debug-info" id="debug2">Waiting for initialization...</div>
  </div>

  <div class="test-section">
    <h2>Test 3: Pagination Only (no navigation)</h2>
    <swiper-carousel id="test3" navigation="false">
      <div class="swiper-slide">X</div>
      <div class="swiper-slide">Y</div>
      <div class="swiper-slide">Z</div>
    </swiper-carousel>
    <div class="debug-info" id="debug3">Waiting for initialization...</div>
  </div>

  <script type="module">
    import './src/index.ts';

    // Intercept console.log to show in debug panels
    const originalLog = console.log;
    const originalWarn = console.warn;
    
    let currentCarousel = 1;
    
    console.log = (...args) => {
      originalLog.apply(console, args);
      const debugEl = document.getElementById(`debug${currentCarousel}`);
      if (debugEl && typeof args[0] === 'string') {
        const div = document.createElement('div');
        div.className = 'info';
        div.textContent = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : a).join(' ');
        debugEl.appendChild(div);
      }
    };

    console.warn = (...args) => {
      originalWarn.apply(console, args);
      const debugEl = document.getElementById(`debug${currentCarousel}`);
      if (debugEl) {
        const div = document.createElement('div');
        div.className = 'error';
        div.textContent = '⚠️ ' + args.join(' ');
        debugEl.appendChild(div);
      }
    };

    customElements.whenDefined('swiper-carousel').then(() => {
      console.log('✓ swiper-carousel component defined');
      
      // Test each carousel
      [1, 2, 3].forEach(num => {
        currentCarousel = num;
        const carousel = document.getElementById(`test${num}`);
        const debugEl = document.getElementById(`debug${num}`);
        
        // Wait a bit for initialization
        setTimeout(() => {
          const shadowRoot = carousel.shadowRoot;
          const hasNav = shadowRoot?.querySelector('.swiper-button-next');
          const hasPagination = shadowRoot?.querySelector('.swiper-pagination');
          
          debugEl.innerHTML = '';
          debugEl.innerHTML += `<div class="${hasNav ? 'success' : 'error'}">Navigation buttons: ${hasNav ? '✓ Found' : '✗ Not found'}</div>`;
          debugEl.innerHTML += `<div class="${hasPagination ? 'success' : 'error'}">Pagination: ${hasPagination ? '✓ Found' : '✗ Not found'}</div>`;
          
          if (carousel.swiper) {
            debugEl.innerHTML += `<div class="success">✓ Swiper instance exists</div>`;
            debugEl.innerHTML += `<div class="info">Slides: ${carousel.swiper.slides?.length || 0}</div>`;
            
            // Check if navigation is working
            if (carousel.swiper.navigation) {
              debugEl.innerHTML += `<div class="info">Navigation module: ${carousel.swiper.navigation.enabled ? 'enabled' : 'disabled'}</div>`;
            }
            
            // Check pagination
            if (carousel.swiper.pagination) {
              debugEl.innerHTML += `<div class="info">Pagination module: ${carousel.swiper.pagination.bullets?.length || 0} bullets</div>`;
            }
          } else {
            debugEl.innerHTML += `<div class="error">✗ No swiper instance</div>`;
          }
        }, 1000);
      });
    });
  </script>
</body>
</html>
